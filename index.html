<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyauw Room | 敬请期待</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; }
        .under-construction {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 背景已更新为 booking-bg.png */
            background: linear-gradient(rgba(245, 245, 220, 0.4), rgba(245, 245, 220, 0.4)), url('booking-bg.png') no-repeat center center;
            background-size: cover;
            text-align: center;
            padding: 20px;
            color: #3E2723;
        }
        .line-1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(3rem, 8vw, 5rem);
            margin-bottom: 20px;
            letter-spacing: 4px;
            color: #C08261;
            text-shadow: 2px 2px 15px rgba(255, 255, 255, 0.8);
        }
        .line-2 {
            font-family: 'Inter', sans-serif;
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            font-weight: 300;
            letter-spacing: 8px;
            text-indent: 8px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="under-construction">
        <div class="line-1">你我的缘分</div>
        <div class="line-2">请期待未来</div>
    </div>
</body>
</html>
