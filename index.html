<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyauw Room | 你的专属安心角落</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #F5F5DC;      /* 暖沙色 */
            --text-main: #3E2723;    /* 深咖啡色 */
            --accent-color: #C08261; /* 陶土红 / 琥珀金 */
            --white: #FFFFFF;
            --font-logo: 'Dancing Script', cursive; /* 模拟 Logo 手写感 */
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* 导航栏 - 高度优化 */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(245, 245, 220, 0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            height: 80px; /* 桌面端高度 */
        }

        .logo img { height: 50px; width: auto; display: block; }

        .nav-right { display: flex; align-items: center; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a {
            margin-left: 25px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--accent-color); }

        .lang-switch {
            margin-left: 25px;
            cursor: pointer;
            font-size: 11px;
            border: 1px solid var(--text-main);
            padding: 5px 10px;
            border-radius: 20px;
            transition: 0.3s;
            font-weight: 600;
        }
        .lang-switch:hover { background: var(--text-main); color: var(--white); }

        .menu-toggle { display: none; font-size: 22px; cursor: pointer; margin-left: 15px; }

        /* 区块间距优化 */
        section {
            padding: 80px 25px;
            max-width: 1100px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }
        section.reveal { opacity: 1; transform: translateY(0); }

        /* 字体策略应用 */
        h1 { font-family: var(--font-logo); font-weight: 400; color: var(--text-main); }
        h2 { font-family: var(--font-serif); font-weight: 400; font-size: 32px; text-align: center; margin-bottom: 40px; }

        #home { height: 80vh; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        #home h1 { font-size: 64px; margin-bottom: 5px; }
        .subtitle { font-size: 18px; font-family: var(--font-serif); font-style: italic; opacity: 0.7; margin-bottom: 40px; }

        /* 桌面端并排布局 */
        .side-by-side {
            display: flex;
            gap: 30px;
            align-items: stretch;
            margin-top: 20px;
        }
        .side-item { flex: 1; }

        .service-container {
            background-color: var(--white);
            padding: 40px;
            height: 100%;
            border-top: 2px solid var(--accent-color);
            box-shadow: 0 10px 30px rgba(62, 39, 35, 0.03);
            transition: 0.4s;
        }
        .service-container:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(62, 39, 35, 0.06); }

        /* 预约区块 */
        .booking-card {
            background-image: linear-gradient(rgba(245, 245, 220, 0.88), rgba(245, 245, 220, 0.88)), url('booking-bg.png');
            background-size: cover;
            background-position: center;
            padding: 100px 40px;
            text-align: center;
            border-radius: 4px;
        }

        .booking-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 20px 60px;
            background-color: var(--text-main);
            color: var(--white);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .booking-btn:hover { background-color: var(--accent-color); letter-spacing: 4px; }

        /* WhatsApp (无下划线) */
        .wa-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 2000;
            text-decoration: none !important;
        }
        .wa-float i { text-decoration: none; }

        /* 移动端优化 */
        @media (max-width: 768px) {
            nav { height: 64px; } /* 高度减少 20% */
            .logo img { height: 35px; }
            .nav-links {
                display: none; position: absolute; top: 64px; left: 0; width: 100%;
                background: var(--bg-color); flex-direction: column; padding: 30px 0;
            }
            .nav-links.active { display: flex; }
            .nav-links a { margin: 15px 0; margin-left: 0; }
            .menu-toggle { display: block; }
            .side-by-side { flex-direction: column; }
            #home h1 { font-size: 48px; }
            section { padding: 60px 25px; }
        }

        footer { text-align: center; padding: 80px 20px; font-size: 11px; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>

                    <a href="#booking" class="lang" data-cn="Booking" data-en="Booking">Booking</a>
                </div>
                <div class="lang-switch" onclick="toggleLanguage()">EN / 中</div>
                <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>

        </nav>
    </header>
