<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyauw Room | 敬请期待</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* 防止出现滚动条 */
            font-family: 'Inter', sans-serif;
        }

        .under-construction {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 采用全屏背景图，并叠加了一层极薄的品牌暖沙色遮罩，确保文字清晰可读 */
            background: linear-gradient(rgba(245, 245, 220, 0.4), rgba(245, 245, 220, 0.4)), url('underconstruct.png') no-repeat center center;
            background-size: cover;
            text-align: center;
            padding: 20px;
            color: #3E2723; /* 品牌深咖啡色 */
        }

        .line-1 {
            font-family: 'Ma Shan Zheng', cursive; /* 书法体，突出“缘分”的温度 */
            font-size: clamp(3rem, 8vw, 5rem);
            margin-bottom: 20px;
            letter-spacing: 4px;
            color: #C08261; /* 品牌陶土红 */
            text-shadow: 2px 2px 15px rgba(255, 255, 255, 0.8); /* 柔和的白色发光，增加文字立体感 */
        }

        .line-2 {
            font-family: 'Inter', sans-serif;
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            font-weight: 300;
            letter-spacing: 8px;
            text-indent: 8px; /* 修正 letter-spacing 带来的居中偏移 */
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="under-construction">
        <div class="line-1">你我的缘分</div>
        <div class="line-2">请期待未来</div>
    </div>

</body>
</html>
