<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYAUW ROOM | People First</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F5F5DC;      /* 品牌暖沙色 */
            --text-main: #3E2723;    /* 深咖啡色 */
            --accent-color: #C08261; /* 陶土红 */
            --white: #FFFFFF;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            transition: background-color 0.5s ease;
        }

        /* 导航栏：已更新为纯白 */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8%;
            height: 64px;
            background-color: var(--white);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 5px rgba(0,0,0,0.02);
        }

        .logo img {
            height: 40px;
            width: auto;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .lang-switch {
            cursor: pointer;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--text-main);
            padding-bottom: 2px;
        }

        /* Hero 区域 */
        .hero {
            padding: 120px 8% 100px;
            max-width: 1200px;
        }

        .hero h1 {
            font-family: var(--font-serif);
            font-size: clamp(2.5rem, 6vw, 4rem);
            line-height: 1.1;
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* 服务展示板块：听与说并排 */
        .split-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background-color: var(--white);
            min-height: 60vh;
        }

        .split-content {
            padding: 100px 15%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .split-content:first-child {
            border-right: 1px solid #F0F0F0;
        }

        .split-content h2 {
            font-family: var(--font-serif);
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        /* 页脚：已更新为纯白 */
        footer {
            background-color: var(--white);
            padding: 80px 8%;
            text-align: center;
            border-top: 1px solid #F0F0F0;
        }

        .footer-text {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .split-section { grid-template-columns: 1fr; }
            .split-content:first-child { border-right: none; border-bottom: 1px solid #F0F0F0; }
            .hero { padding: 80px 8% 60px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <img src="logo.png" alt="LYAUW ROOM">
        </div>
        <div class="nav-right">
            <div class="lang-switch" onclick="toggleLang()" id="langBtn">EN / 中</div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <h1 id="hero-title">在这个喧嚣的世界，<br>我们为您预留了一处静谧。</h1>
        </section>

        <section class="split-section">
            <div class="split-content">
                <h2 id="listen-title">听 · Listen</h2>
                <p id="listen-desc">提供最纯粹的倾听。那些不便对身边人说的话，在这里都有回响。</p>
            </div>
            <div class="split-content">
                <h2 id="talk-title">说 · Talk</h2>
                <p id="talk-desc">理清思绪，在共情中寻找答案。我们陪你拨开迷雾，看见真实的自己。</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-text">
            © 2026 LYAUW ROOM PLT · People First · Radical Empathy
        </div>
    </footer>

    <script>
        const content = {
            zh: {
                hero: "在这个喧嚣的世界，<br>我们为您预留了一处静谧。",
                listenTitle: "听 · Listen",
                listenDesc: "提供最纯粹的倾听。那些不便对身边人说的话，在这里都有回响。",
                talkTitle: "说 · Talk",
                talkDesc: "理清思绪，在共情中寻找答案。我们陪你拨开迷雾，看见真实的自己。",
                btn: "EN / 中"
            },
            en: {
                hero: "In a world of noise, <br>we hold a space of silence for you.",
                listenTitle: "Listen",
                listenDesc: "Pure, non-judgmental listening. For the words you cannot say to those closest to you.",
                talkTitle: "Talk",
                talkDesc: "Clarify your thoughts and find clarity through radical empathy.",
                btn: "中 / EN"
            }
        };

        let currentLang = 'zh';

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            const data = content[currentLang];
            
            document.getElementById('hero-title').innerHTML = data.hero;
            document.getElementById('listen-title').innerText = data.listenTitle;
            document.getElementById('listen-desc').innerText = data.listenDesc;
            document.getElementById('talk-title').innerText = data.talkTitle;
            document.getElementById('talk-desc').innerText = data.talkDesc;
            document.getElementById('langBtn').innerText = data.btn;
        }
    </script>
</body>
</html>
