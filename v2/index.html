<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyauw Room | A/B Test Variant B</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F5F5DC;      /* 品牌：暖沙色 */
            --text-main: #3E2723;    /* 品牌：深咖啡色 */
            --accent-color: #C08261; /* 品牌：陶土红 */
            --white: #FFFFFF;
            --font-logo: 'Dancing Script', cursive;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* 导航栏优化：高度缩小 20% */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8%;
            height: 64px; /* 从 80px 缩小 20% */
            background: rgba(245, 245, 220, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo img {
            height: 40px;
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            margin-left: 30px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        .cta-btn {
            background-color: var(--text-main);
            color: white;
            padding: 10px 22px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-left: 30px;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .cta-btn:hover {
            background-color: var(--accent-color);
        }

        /* Hero 区域：应用 booking-bg.png */
        .hero {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 15%;
            background: linear-gradient(rgba(245,245,220,0.85), rgba(245,245,220,0.85)), url('booking-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero-content h1 {
            font-family: var(--font-serif);
            font-size: 3rem;
            margin-bottom: 20px;
            line-height: 1.2;
            font-weight: 400;
        }

        .hero-content h1 em {
            font-family: var(--font-logo);
            font-style: normal;
            font-size: 3.5rem;
            display: block;
            margin-top: 10px;
        }

        .hero-content p {
            font-size: 1.1rem;
            margin-bottom: 40px;
            font-style: italic;
            opacity: 0.8;
        }

        /* 视频展位：使用品牌色 */
        .video-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: var(--text-main);
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 30px 60px rgba(62, 39, 35, 0.1);
            background-image: url('booking-bg.png');
            background-size: cover;
            background-blend-mode: multiply;
        }

        .play-icon {
            width: 70px;
            height: 70px;
            border: 1px solid var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }

        .play-icon:hover {
            transform: scale(1.1);
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        /* 媒体背书区域 (Social Proof) */
        .social-proof {
            padding: 50px 0;
            background: var(--white);
            text-align: center;
        }

        .social-proof p {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
            color: #AAA;
        }

        .logo-grid {
            display: flex;
            justify-content: center;
            gap: 60px;
            opacity: 0.5;
            font-family: var(--font-serif);
            font-size: 1.2rem;
            filter: grayscale(100%);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2rem; }
            .hero-content h1 em { font-size: 2.2rem; }
            .nav-links { display: none; }
            .hero { padding: 60px 8%; }
            .logo-grid { gap: 30px; font-size: 0.9rem; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo"><img src="logo.png" alt="Lyauw Room"></a>
        <div class="nav-links">
            <a href="#">About</a>
            <a href="#">Listen</a>
            <a href="#">Talk</a>
            <button class="cta-btn">立即预约</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>在这个喧嚣的世界 <br><em>我们静静聆听。</em></h1>
            <p>基于“以人为本”的哲学，为您提供一段剥离压力的第三空间时光。</p>
            
            <div class="video-container">
                <div class="play-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </div>
            </div>
        </div>
    </header>

    <section class="social-proof">
        <p>PEOPLE FIRST · RADICAL EMPATHY</p>
        <div class="logo-grid">
            <span>Authenticity</span>
            <span>Respect</span>
            <span>Security</span>
            <span>Warmth</span>
        </div>
    </section>

</body>
</html>
